<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Washlyy Login</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/logo.png">
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container premium-card">

  <h2>Washlyy.in</h2>

  <p class="tagline">
    Smart Laundry Pickup & Delivery
  </p>

  <input
    id="email"
    type="email"
    placeholder="Email"
  >

  <div class="password-box">

    <input
      id="password"
      type="password"
      placeholder="Password"
    >

    <span onclick="togglePassword()">👁️</span>

  </div>

  <p style="text-align:right; margin:10px 0;">
    <a href="#" onclick="forgotPassword()">
      Forgot Password?
    </a>
  </p>

  <button onclick="login()">
    Login
  </button>

  <button onclick="signup()">
    Create Account
  </button>

</div>

<script type="module" src="js/auth.js"></script>

<script>
function togglePassword() {
  const p = document.getElementById("password");

  p.type =
    p.type === "password"
      ? "text"
      : "password";
}
</script>

</body>
</html>
