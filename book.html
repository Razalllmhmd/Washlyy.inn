<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Pickup - Washlyy</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/book.css">
<link rel="icon" type="image/png" href="images/logo.png">

</head>

<body>

<div class="bg"></div>

<div class="container">

  <div class="card">

    <h1>Schedule Pickup 🧺</h1>
    <p>Fast pickup, clean delivery at your doorstep</p>

    <div class="form-grid">

      <input id="name" type="text" placeholder="Full Name">

      <input id="phone" type="text" placeholder="Phone Number">

      <textarea id="address" placeholder="Pickup Address"></textarea>

      <input id="pickupDate" type="date">

      <select id="service">
        <option>Wash & Fold</option>
        <option>Dry Cleaning</option>
        <option>Ironing</option>
      </select>

    </div>

    <button onclick="bookOrder()">
      Schedule Pickup
    </button>

  </div>

</div>

<script type="module" src="js/book.js"></script>

</body>
</html>
